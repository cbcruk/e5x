<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>e5x — data table</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 44rem; margin: 3rem auto; color: #1a1a1a; }
      h1 { font-size: 1.4rem; }
      .controls { display: flex; gap: 1rem; align-items: center; margin: 1rem 0; }
      table { border-collapse: collapse; width: 100%; }
      th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #e0e0e0; }
      th { cursor: pointer; user-select: none; font-size: 0.85rem; color: #555; }
      th[aria-sort='ascending']::after { content: ' ▲'; }
      th[aria-sort='descending']::after { content: ' ▼'; }
      td.amount, th.amount { text-align: right; font-variant-numeric: tabular-nums; }
      tfoot td { font-weight: 600; border-top: 2px solid #1a1a1a; border-bottom: none; }
      input[type='number'] { width: 5rem; text-align: right; }
      button { cursor: pointer; }
      .del { color: #b00; border: none; background: none; font-size: 1rem; }
    </style>
  </head>
  <body>
    <h1>e5x — data table</h1>

    <rows hidden>
      <row name="Alice" dept="eng" amount="120" active="true"></row>
      <row name="Bob" dept="eng" amount="80" active="false"></row>
      <row name="Carol" dept="sales" amount="200" active="true"></row>
      <row name="Dave" dept="sales" amount="60" active="true"></row>
      <row name="Erin" dept="design" amount="140" active="false"></row>
    </rows>

    <div class="controls">
      <label><input id="activeOnly" type="checkbox" /> Active only</label>
      <button id="add">Add row</button>
      <span style="margin-left:auto">
        live total: <strong id="liveTotal">?</strong>
      </span>
    </div>

    <table id="table">
      <thead>
        <tr>
          <th data-field="name">Name</th>
          <th data-field="dept">Dept</th>
          <th class="amount" data-field="amount">Amount</th>
          <th>Active</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot>
        <tr>
          <td>Total (<span id="count">0</span>)</td>
          <td></td>
          <td class="amount"><span id="sum">0</span></td>
          <td colspan="2">avg <span id="avg">0</span></td>
        </tr>
      </tfoot>
    </table>

    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
